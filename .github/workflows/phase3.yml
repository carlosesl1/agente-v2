name: phase-3-lookups

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  read-only-adapters:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate previous phase gates
        env:
          PHASE1_LEGACY_SOURCE: /path-not-present-in-ci
        run: |
          python3 scripts/validate_phase0.py
          python3 scripts/validate_phase1.py
          python3 scripts/validate_phase2.py
      - name: Regenerate deterministic Phase 3 manifests
        run: |
          python3 scripts/generate_phase3_manifest.py \
            --lookup-manifest docs/refactor/evidence/phase-03/lookup-manifest.json \
            --fixture-manifest docs/refactor/evidence/phase-03/fixture-manifest.json \
            >/dev/null
          git diff --exit-code -- \
            docs/refactor/evidence/phase-03/lookup-manifest.json \
            docs/refactor/evidence/phase-03/fixture-manifest.json
      - name: Run all unit and contract tests
        run: python3 -m unittest discover -s tests -v
      - name: Run 50k bilateral lookup properties
        run: |
          python3 scripts/run_phase3_properties.py \
            --cases 50000 \
            --seed 20260718 \
            --write docs/refactor/evidence/phase-03/property-result.json \
            >/dev/null
          git diff --exit-code -- docs/refactor/evidence/phase-03/property-result.json
      - name: Kill the closed mutation catalog
        run: |
          python3 scripts/run_phase3_mutations.py \
            --write docs/refactor/evidence/phase-03/mutation-result.json \
            >/dev/null
          git diff --exit-code -- docs/refactor/evidence/phase-03/mutation-result.json
      - name: Validate Phase 3 artifacts and purity
        env:
          PHASE1_LEGACY_SOURCE: /path-not-present-in-ci
        run: python3 scripts/validate_phase3.py
      - name: Compile Python sources
        run: python3 -m compileall -q reservation_domain reservation_lookup characterization scripts tests
      - name: Check whitespace
        run: git diff --check
