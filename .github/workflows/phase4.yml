name: phase-4-confirmation

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  single-summary-confirmation:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate previous phase gates
        env:
          PHASE1_LEGACY_SOURCE: /path-not-present-in-ci
        run: |
          python3 scripts/validate_phase0.py
          python3 scripts/validate_phase1.py
          python3 scripts/validate_phase2.py
          python3 scripts/validate_phase3.py
      - name: Regenerate deterministic Phase 4 manifests
        run: |
          python3 scripts/generate_phase4_manifest.py \
            --package-manifest docs/refactor/evidence/phase-04/package-manifest.json \
            --fixture-manifest docs/refactor/evidence/phase-04/fixture-manifest.json \
            >/dev/null
          git diff --exit-code -- \
            docs/refactor/evidence/phase-04/package-manifest.json \
            docs/refactor/evidence/phase-04/fixture-manifest.json
      - name: Run all unit and contract tests
        run: python3 -m unittest discover -s tests -v
      - name: Run 50k confirmation authorization properties
        run: |
          python3 scripts/run_phase4_properties.py \
            --cases 50000 \
            --seed 20260719 \
            --write docs/refactor/evidence/phase-04/property-result.json \
            >/dev/null
          git diff --exit-code -- docs/refactor/evidence/phase-04/property-result.json
      - name: Kill the closed mutation catalog
        run: |
          python3 scripts/run_phase4_mutations.py \
            --write docs/refactor/evidence/phase-04/mutation-result.json \
            >/dev/null
          git diff --exit-code -- docs/refactor/evidence/phase-04/mutation-result.json
      - name: Validate Phase 4 artifacts and purity
        env:
          PHASE1_LEGACY_SOURCE: /path-not-present-in-ci
        run: python3 scripts/validate_phase4.py
      - name: Compile Python sources
        run: python3 -m compileall -q reservation_domain reservation_lookup reservation_confirmation characterization scripts tests
      - name: Check whitespace
        run: git diff --check
