      ],
      "question": "Se eu cancelar com 48 horas de antecedência, recebo o dinheiro de volta?",
      "answer": "Sim. Cancelamentos realizados até 48 horas antes do início da primeira excursão: o valor adiantado de 20% do valor total do pacote será reembolsado integralmente."
    },
    {
      "id": "cancelamento_entre_48h_12h",
      "topic": "cancelamento_reembolso",
      "tags": [
        "cancelamento",
        "48 horas",
        "12 horas",
        "sinal"
      ],
      "question": "E se eu cancelar entre 48 horas e 12 horas antes do passeio?",
      "answer": "Neste caso, somente o valor adiantado de 20% será cobrado integralmente pela empresa, ou seja, você perderá apenas esse sinal. Não é cobrança de 100% do valor total; a cobrança de 100% só se aplica no prazo de até 12 horas antes/início da véspera, conforme a política específica."
    },
    {
      "id": "cancelamento_ate_12h",
      "topic": "cancelamento_reembolso",
      "tags": [
        "cancelamento",
        "12 horas",
        "perda total"
      ],
      "question": "Posso cancelar até 12 horas antes sem perder dinheiro?",
      "answer": "Não. Cancelamentos realizados até 12 horas antes do início da excursão, ou seja, até as 8 horas da noite anterior, terão cobrança de 100% do valor total da excursão."
    },
    {
      "id": "cancelamento_pos_pagamento_integral",
      "topic": "cancelamento_reembolso",
      "tags": [
        "cancelamento",
        "pagamento integral",
        "força maior"
      ],
      "question": "Já paguei tudo, ainda posso ter reembolso se cancelar?",
      "answer": "Depois que o valor integral foi pago no dia anterior da excursão, não haverá reembolso possível, fora de casos de força maior, como acidente grave ou óbito na família próxima."
    },
    {
      "id": "prazo_reembolso",
      "topic": "cancelamento_reembolso",
      "tags": [
        "reembolso",
        "prazo",
        "dias úteis"
      ],
      "question": "Em quanto tempo recebo meu reembolso?",
      "answer": "Os reembolsos, quando aplicáveis, serão processados dentro de 7 dias úteis após a solicitação de cancelamento."
    },
    {
      "id": "mudar_datas_passeio",
      "topic": "alteracao_reserva",
      "tags": [
        "mudar datas",
        "modificar reserva",
        "disponibilidade"
      ],
      "question": "Posso mudar as datas do meu passeio depois de reservar?",
      "answer": "Sim. Caso deseje modificar a reserva, como mudança de datas ou de roteiro, informe pelo WhatsApp com pelo menos 24 horas de antecedência. A equipe confirma por ali; as modificações estão sujeitas à disponibilidade e podem incorrer em custos adicionais."
    },
    {
      "id": "passeio_mais_barato_sem_reembolso",
      "topic": "alteracao_reserva",
      "tags": [
        "modificação",
        "passeio mais barato",
        "diferença"
      ],
      "question": "Se eu mudar para um passeio mais barato, recebo a diferença?",
      "answer": "Não haverá reembolsos para modificações que resultem em um valor menor do que o originalmente pago. Quaisquer diferenças a maior deverão ser pagas pelo cliente."
    },
    {
