      ],
      "question": "A agência pode cancelar meu passeio?",
      "answer": "Sim, a agência se reserva o direito de cancelar a excursão por motivos de segurança, condições climáticas adversas, número insuficiente de participantes ou outros fatores imprevistos. Nesses casos excepcionais, outras opções de passeios similares serão oferecidas."
    },
