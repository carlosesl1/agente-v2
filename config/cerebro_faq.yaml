      ],
      "question": "Se vocês cancelarem meu passeio, recebo meu dinheiro de volta?",
      "answer": "Em caso de cancelamento pela Agência, você terá direito ao reembolso total do valor pago ou poderá optar por remarcar a excursão para outra data disponível sem custos adicionais."
    },
