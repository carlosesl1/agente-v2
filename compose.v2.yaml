services:
  api:
    image: ${V2_IMAGE_REF:?set V2_IMAGE_REF to an immutable repository@sha256 digest}
    user: "${V2_RUNTIME_UID:-1001}:${V2_RUNTIME_GID:-1001}"
    command: []
    environment: &v2-environment
      HOME: /hermes/home
      HERMES_HOME: /hermes
      V2_RUNTIME_MODE: "${V2_RUNTIME_MODE:-dark_read_only}"
      V2_CANDIDATE_GIT_SHA: "${V2_CANDIDATE_GIT_SHA:?set frozen candidate git sha}"
      V2_CANDIDATE_IMAGE_DIGEST: "${V2_CANDIDATE_IMAGE_DIGEST:?set immutable image digest}"
      V2_ALLOWED_SUBSCRIBER_IDS: "1873018537"
      V2_GLOBAL_KILL_SWITCH: "${V2_GLOBAL_KILL_SWITCH:-true}"
      V2_WRITE_WINDOW_END: "${V2_WRITE_WINDOW_END:-}"
      V2_REAL_EFFECTS_ACK: "${V2_REAL_EFFECTS_ACK:-}"

      V2_MANYCHAT_WEBHOOK_SECRET: "${V2_MANYCHAT_WEBHOOK_SECRET:?set V2_MANYCHAT_WEBHOOK_SECRET}"
      V2_STRIPE_WEBHOOK_SECRET: "${V2_STRIPE_WEBHOOK_SECRET:?set V2_STRIPE_WEBHOOK_SECRET}"
      V2_WISE_WEBHOOK_SECRET: "${V2_WISE_WEBHOOK_SECRET:?set V2_WISE_WEBHOOK_SECRET}"
      V2_PIX_WEBHOOK_SECRET: "${V2_PIX_WEBHOOK_SECRET:?set V2_PIX_WEBHOOK_SECRET}"
      V2_PIX_RECEIVER_PROFILE_ID: "${V2_PIX_RECEIVER_PROFILE_ID:?set V2_PIX_RECEIVER_PROFILE_ID}"
      V2_WISE_SIGNER_PROFILE_ID: "${V2_WISE_SIGNER_PROFILE_ID:?set V2_WISE_SIGNER_PROFILE_ID}"
      V2_WISE_ACCOUNT_PROFILE_ID: "${V2_WISE_ACCOUNT_PROFILE_ID:?set V2_WISE_ACCOUNT_PROFILE_ID}"
      V2_STRIPE_ACCOUNT_PROFILE_ID: "${V2_STRIPE_ACCOUNT_PROFILE_ID:?set V2_STRIPE_ACCOUNT_PROFILE_ID}"

      V2_CLOUDBEDS_API_KEY: "${V2_CLOUDBEDS_API_KEY:?set V2_CLOUDBEDS_API_KEY}"
      V2_CLOUDBEDS_PROPERTY_ID: "${V2_CLOUDBEDS_PROPERTY_ID:?set V2_CLOUDBEDS_PROPERTY_ID}"
      V2_CLOUDBEDS_SOURCE_ID: "${V2_CLOUDBEDS_SOURCE_ID:?set V2_CLOUDBEDS_SOURCE_ID}"
      V2_CLOUDBEDS_BASE_URL: "${V2_CLOUDBEDS_BASE_URL:-https://api.cloudbeds.com}"
      V2_BOKUN_ACCESS_KEY: "${V2_BOKUN_ACCESS_KEY:?set V2_BOKUN_ACCESS_KEY}"
      V2_BOKUN_SECRET_KEY: "${V2_BOKUN_SECRET_KEY:?set V2_BOKUN_SECRET_KEY}"
      V2_BOKUN_PRODUCT_MAP_JSON: "${V2_BOKUN_PRODUCT_MAP_JSON:?set V2_BOKUN_PRODUCT_MAP_JSON}"
      V2_BOKUN_BASE_URL: "${V2_BOKUN_BASE_URL:-https://api.bokun.io}"
      V2_READ_PROBE_CHECK_IN: "${V2_READ_PROBE_CHECK_IN:?set V2_READ_PROBE_CHECK_IN}"
      V2_READ_PROBE_CHECK_OUT: "${V2_READ_PROBE_CHECK_OUT:?set V2_READ_PROBE_CHECK_OUT}"
      V2_READ_PROBE_ACTIVITY_DATE: "${V2_READ_PROBE_ACTIVITY_DATE:?set V2_READ_PROBE_ACTIVITY_DATE}"
      V2_READ_PROBE_PRODUCT_ID: "${V2_READ_PROBE_PRODUCT_ID:?set V2_READ_PROBE_PRODUCT_ID}"
      V2_READ_PROBE_INTERVAL_SECONDS: "${V2_READ_PROBE_INTERVAL_SECONDS:-60}"

      V2_MANYCHAT_API_KEY: "${V2_MANYCHAT_API_KEY:?set V2_MANYCHAT_API_KEY}"
      V2_MANYCHAT_BASE_URL: "${V2_MANYCHAT_BASE_URL:-https://api.manychat.com}"
      V2_MANYCHAT_REPLY_FIELD_ID: "${V2_MANYCHAT_REPLY_FIELD_ID:?set V2_MANYCHAT_REPLY_FIELD_ID}"
      V2_MANYCHAT_REPLY_FLOW_NS: "${V2_MANYCHAT_REPLY_FLOW_NS:?set V2_MANYCHAT_REPLY_FLOW_NS}"
      V2_MANYCHAT_PAYMENT_LINK_FIELD_ID: "${V2_MANYCHAT_PAYMENT_LINK_FIELD_ID:?set V2_MANYCHAT_PAYMENT_LINK_FIELD_ID}"
      V2_MANYCHAT_PAYMENT_DESCRIPTION_FIELD_ID: "${V2_MANYCHAT_PAYMENT_DESCRIPTION_FIELD_ID:?set V2_MANYCHAT_PAYMENT_DESCRIPTION_FIELD_ID}"
      V2_MANYCHAT_PAYMENT_FLOW_NS: "${V2_MANYCHAT_PAYMENT_FLOW_NS:?set V2_MANYCHAT_PAYMENT_FLOW_NS}"
      V2_MANYCHAT_HANDOFF_TAG_ID: "${V2_MANYCHAT_HANDOFF_TAG_ID:?set V2_MANYCHAT_HANDOFF_TAG_ID}"
      V2_MANYCHAT_HANDOFF_FLOW_NS: "${V2_MANYCHAT_HANDOFF_FLOW_NS:?set V2_MANYCHAT_HANDOFF_FLOW_NS}"

      V2_STRIPE_ENVIRONMENT: test
      V2_STRIPE_HOSTEL_ACCOUNT_PROFILE_ID: "${V2_STRIPE_HOSTEL_ACCOUNT_PROFILE_ID:?set hostel Stripe profile id}"
      V2_STRIPE_AGENCY_ACCOUNT_PROFILE_ID: "${V2_STRIPE_AGENCY_ACCOUNT_PROFILE_ID:?set agency Stripe profile id}"
      V2_STRIPE_HOSTEL_SECRET_KEY: "${V2_STRIPE_HOSTEL_SECRET_KEY:?set hostel Stripe test key}"
      V2_STRIPE_AGENCY_SECRET_KEY: "${V2_STRIPE_AGENCY_SECRET_KEY:?set agency Stripe test key}"
      V2_STRIPE_BASE_URL: "${V2_STRIPE_BASE_URL:-https://api.stripe.com}"

      V2_HERMES_MODEL: openai-codex/gpt-5.6-luna
      V2_HERMES_COMMAND_JSON: '["python","-m","v2_host.hermes_child","hermes","--profile","leads","chat","-m","gpt-5.6-luna","--provider","openai-codex","-Q","--safe-mode","--source","tool"]'
      V2_HERMES_SYSTEM_PROMPT_PATH: /app/config/v2_luna_system_prompt.txt
      V2_HERMES_TRANSCRIPT_KEY_HEX: "${V2_HERMES_TRANSCRIPT_KEY_HEX:?set transcript HMAC key}"
      V2_HERMES_TIMEOUT_SECONDS: "${V2_HERMES_TIMEOUT_SECONDS:-150}"
      V2_KNOWLEDGE_BASE_PATH: /app/config/cerebro_faq.yaml
      V2_PUBLIC_AUTHORITY_MANIFEST_PATH: /run/v2/public-authority.json
      V2_PUBLIC_AUTHORITY_HMAC_KEY_HEX: "${V2_PUBLIC_AUTHORITY_HMAC_KEY_HEX:?set authority HMAC key}"

      V2_REQUIRE_WORKER_HEARTBEAT: "true"
      V2_WORKER_HEARTBEAT_MAX_AGE_SECONDS: "${V2_WORKER_HEARTBEAT_MAX_AGE_SECONDS:-10}"
      V2_SQLITE_PATH: /data/inbox.sqlite3
      V2_API_HOST: 0.0.0.0
      V2_API_PORT: "8080"
      V2_MAX_WEBHOOK_BODY_BYTES: "${V2_MAX_WEBHOOK_BODY_BYTES:-65536}"

      V2_ENABLE_CLOUDBEDS_WRITES: "${V2_ENABLE_CLOUDBEDS_WRITES:-false}"
      V2_ENABLE_BOKUN_WRITES: "${V2_ENABLE_BOKUN_WRITES:-false}"
      V2_ENABLE_STRIPE_LINKS: "${V2_ENABLE_STRIPE_LINKS:-false}"
      V2_ENABLE_MANYCHAT_DELIVERY: "${V2_ENABLE_MANYCHAT_DELIVERY:-false}"
      V2_ENABLE_MANYCHAT_HANDOFF: "${V2_ENABLE_MANYCHAT_HANDOFF:-false}"
    ports:
      - "127.0.0.1:${V2_BIND_PORT:-18090}:8080"
    volumes: &v2-volumes
      - "${V2_STATE_DIR:?set V2_STATE_DIR}:/data"
      - "${V2_HERMES_HOME_PATH:?set V2_HERMES_HOME_PATH}:/hermes"
      - "${V2_PUBLIC_AUTHORITY_MANIFEST_HOST_PATH:?set authority manifest path}:/run/v2/public-authority.json:ro"
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import json,urllib.request;
          assert json.load(urllib.request.urlopen('http://127.0.0.1:8080/readyz'))['status']=='ready'
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  worker:
    image: ${V2_IMAGE_REF:?set V2_IMAGE_REF to an immutable repository@sha256 digest}
    user: "${V2_RUNTIME_UID:-1001}:${V2_RUNTIME_GID:-1001}"
    entrypoint: ["python", "-m", "v2_host.worker_main"]
    environment:
      <<: *v2-environment
      V2_WORKER_FACTORY: v2_host.production:build_worker_set
      V2_WORKER_INTERVAL_SECONDS: "${V2_WORKER_INTERVAL_SECONDS:-0.25}"
    volumes: *v2-volumes
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
